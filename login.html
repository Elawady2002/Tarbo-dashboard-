<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Tarbo Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #111111;
      --accent: #2d7a2d;
      --bg: #f8f9fa;
      --white: #ffffff;
      --error: #d93025;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 30px;
      color: var(--primary);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--primary);
    }

    p.subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #888;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: var(--white);
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #333; }
    
    #message {
      margin-top: 20px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    .error { background: #fce8e6; color: var(--error); }
    .success { background: #e6f4ea; color: var(--accent); }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">TARBO</div>
  <h1>Admin Portal</h1>
  <p class="subtitle">Enter your credentials to access the dashboard</p>

  <form id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required placeholder="admin@tarbo.store" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="••••••••" />
    </div>
    <button type="submit" class="btn-login" id="loginBtn">
      <span id="btnText">Sign In</span>
      <div class="loader" id="loader"></div>
    </button>
  </form>

  <div id="message"></div>
</div>

<script>
  const adminEmail = 'admin@tarbo.store';
  const adminPassword = 'admin123456';
  const sessionKey = 'tarboAdminSession';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const msg = document.getElementById('message');

    // UI Feedback
    btnText.style.display = 'none';
    loader.style.display = 'block';
    btn.disabled = true;
    msg.style.display = 'none';

    setTimeout(() => {
      if (email === adminEmail && password === adminPassword) {
        localStorage.setItem(sessionKey, JSON.stringify({
          email,
          loggedInAt: new Date().toISOString(),
        }));

        msg.textContent = 'Login successful! Redirecting...';
        msg.className = 'success';
        msg.style.display = 'block';
        window.location.href = 'index.html';
      } else {
        msg.textContent = 'Invalid email or password.';
        msg.className = 'error';
        msg.style.display = 'block';

        btnText.style.display = 'block';
        loader.style.display = 'none';
        btn.disabled = false;
      }
    }, 300);
  });

  function checkSession() {
    if (localStorage.getItem(sessionKey)) {
      window.location.href = 'index.html';
    }
  }
  checkSession();
</script>

</body>
</html>
