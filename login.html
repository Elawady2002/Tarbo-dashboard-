<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول - تاربو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #111111;
      --accent: #2d7a2d;
      --bg: #f8f9fa;
      --white: #ffffff;
      --error: #d93025;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      direction: rtl;
    }

    .login-card {
      background: var(--white);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 30px;
      color: var(--primary);
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--primary);
    }

    p.subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }

    .form-group {
      text-align: right;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
      color: #888;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-left: 52px;
    }

    .toggle-password {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #777;
      display: grid;
      place-items: center;
      cursor: pointer;
      border-radius: 8px;
    }

    .toggle-password:focus {
      outline: none;
      background: #f1f2f4;
    }

    .toggle-password svg {
      width: 21px;
      height: 21px;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    .btn-login {
      width: 100%;
      background: var(--primary);
      color: var(--white);
      border: none;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #333; }
    
    #message {
      margin-top: 20px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    .error { background: #fce8e6; color: var(--error); }
    .success { background: #e6f4ea; color: var(--accent); }

    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo">TARBO</div>
  <h1>لوحة التحكم</h1>
  <p class="subtitle">اكتب بيانات الدخول للوصول للداشبورد</p>

  <form id="loginForm">
    <div class="form-group">
      <label>الإيميل</label>
      <input type="email" id="email" required placeholder="admin@tarbo.com" />
    </div>
    <div class="form-group">
      <label>كلمة السر</label>
      <div class="password-wrap">
        <input type="password" id="password" required placeholder="••••••••" />
        <button type="button" class="toggle-password" id="togglePassword" aria-label="إظهار كلمة السر">
          <svg id="eyeIcon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">
      <span id="btnText">دخول</span>
      <div class="loader" id="loader"></div>
    </button>
  </form>

  <div id="message"></div>
</div>

<script>
  const adminEmails = ['admin@tarbo.store', 'admin@tarbo.com'];
  const adminPassword = 'admin123456';
  const sessionKey = 'tarboAdminSession';
  const passwordInput = document.getElementById('password');
  const togglePassword = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');

  togglePassword.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    togglePassword.setAttribute('aria-label', isHidden ? 'إخفاء كلمة السر' : 'إظهار كلمة السر');
    eyeIcon.innerHTML = isHidden
      ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a20.64 20.64 0 0 1 5.06-5.94M9.9 4.24A10.53 10.53 0 0 1 12 4c7 0 11 8 11 8a19.79 19.79 0 0 1-2.17 3.19"></path><path d="M1 1l22 22"></path><path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"></path>'
      : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle>';
  });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const loader = document.getElementById('loader');
    const msg = document.getElementById('message');

    // UI Feedback
    btnText.style.display = 'none';
    loader.style.display = 'block';
    btn.disabled = true;
    msg.style.display = 'none';

    setTimeout(() => {
      if (adminEmails.includes(email) && password === adminPassword) {
        localStorage.setItem(sessionKey, JSON.stringify({
          email,
          loggedInAt: new Date().toISOString(),
        }));

        msg.textContent = 'تم الدخول بنجاح...';
        msg.className = 'success';
        msg.style.display = 'block';
        window.location.href = 'index.html';
      } else {
        msg.textContent = 'الإيميل أو كلمة السر غير صحيحة.';
        msg.className = 'error';
        msg.style.display = 'block';

        btnText.style.display = 'block';
        loader.style.display = 'none';
        btn.disabled = false;
      }
    }, 300);
  });

  function checkSession() {
    if (localStorage.getItem(sessionKey)) {
      window.location.href = 'index.html';
    }
  }
  checkSession();
</script>

</body>
</html>
