<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile optimized viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tarbo Admin Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --primary: #111111;
      --text: #333333;
      --text-muted: #888888;
      --border: #e0e0e0;
      --accent: #2d7a2d;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      /* Max width for desktop viewing to keep it mobile-like */
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    /* Header */
    header {
      background: var(--card-bg);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    header h1 img {
      height: 24px;
      width: auto;
    }

    /* Main Content Area */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: 80px; /* Space for bottom nav */
    }

    /* Tabs */
    .tab-content {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .tab-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    
    /* Order Styles */
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .order-date {
      font-size: 12px;
      color: var(--text-muted);
    }
    .order-status {
      font-size: 10px;
      background: #e8f5e9;
      color: var(--accent);
      padding: 4px 8px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .order-details p {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .order-details strong {
      color: var(--primary);
    }
    .order-items {
      margin-top: 12px;
      background: var(--bg);
      padding: 10px;
      border-radius: 6px;
    }
    .order-item {
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .order-total {
      margin-top: 12px;
      font-weight: 700;
      text-align: right;
      color: var(--primary);
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      background: var(--bg);
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--card-bg);
    }
    
    .color-section {
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      background: var(--bg);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:active { background: #333; }
    .btn-secondary {
      background: var(--bg);
      color: var(--primary);
      border: 1px solid var(--border);
      margin-top: 8px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 12px 0 24px 0; /* Extra padding for iOS bottom bar */
      z-index: 10;
      max-width: 600px;
      margin: 0 auto;
    }
    .nav-item {
      background: none;
      border: none;
      color: var(--text-muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.2s;
    }
    .nav-item svg {
      width: 24px;
      height: 24px;
    }
    .nav-item.active {
      color: var(--primary);
    }

    /* Loader */
    .loader {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
    }
    
    .image-preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .image-preview {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
  </style>
</head>

  <main>

    <div id="ordersTab" class="tab-content active">

      <div class="card">
        <form id="addProductForm">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="prodName" required placeholder="e.g. Caven Suit" />
          </div>
          
          <div class="form-group">
            <label>Price (LE)</label>
            <input type="number" id="prodPrice" required placeholder="1200" />

          <div class="form-group">

            <input type="number" id="prodStock" required placeholder="50" />

          <div id="colorsContainer">
            <div class="color-section" data-index="0">
              <div class="form-group">
                <label>Color Name</label>
                <input type="text" class="color-name" required placeholder="e.g. Black" />
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label>Upload Images for this Color</label>
                <input type="file" class="color-images" multiple accept="image/*" onchange="previewImages(this, 0)" />
                <div class="image-preview-container" id="preview-0"></div>
              </div>
            </div>
          </div>
          
          <button type="button" class="btn btn-secondary" onclick="addColorSection()" style="margin-bottom: 24px;">+ Add Another Color</button>

          <button type="submit" class="btn" id="submitProductBtn">Save Product</button>
          <div id="productMessage" style="margin-top: 12px; font-size: 14px; text-align: center;"></div>
        </form>
      </div>
    </div>

    <!-- HERO TAB -->
    <div id="heroTab" class="tab-content">
      <h2 style="font-size: 16px; margin-bottom: 16px;">Hero Section Images</h2>
      <div class="card">
        <form id="heroForm">
          <div class="form-group" style="margin-bottom: 0;">
            <label>Upload New Hero Images</label>
            <input type="file" id="heroImagesInput" multiple accept="image/*" onchange="previewHeroImages(this)" />
            <div class="image-preview-container" id="heroPreview"></div>
          </div>
          <button type="submit" class="btn" id="submitHeroBtn" style="margin-top: 16px;">Upload Images</button>
          <div id="heroMessage" style="margin-top: 12px; font-size: 14px; text-align: center;"></div>

  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Supabase configuration
    const supabaseUrl = 'https://erbidxbhooavcynttbml.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyYmlkeGJob29hdmN5bnR0Ym1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODk5MTgsImV4cCI6MjA5Mjc2NTkxOH0.HyksCx9ZVhZNdXfgNLiH3V9HnZUDh8I3KFbM_ovUn8o';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    let colorCount = 1;

    // Switch Tabs
    function switchTab(tabId, btnElement) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      
      document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
      btnElement.classList.add('active');

      if (tabId === 'ordersTab') {
        fetchOrders();
      }
    }

    // Fetch Orders
    async function fetchOrders() {
      const container = document.getElementById('ordersContainer');
      container.innerHTML = '<div class="loader">Loading orders...</div>';

      try {
        const { data, error } = await supabase
          .from('orders')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) {
          // If table doesn't exist, this throws. We show a helpful message.
          if(error.code === '42P01') {
            container.innerHTML = `<div class="loader" style="color:var(--red);">Table 'orders' does not exist in Supabase yet. Please create it.</div>`;
          } else {
            throw error;
          }
          return;
        }

        if (data.length === 0) {
          container.innerHTML = '<div class="loader">No orders found.</div>';
          return;
        }

        container.innerHTML = '';
        data.forEach(order => {
          const d = new Date(order.created_at);
          let itemsHtml = '';
          if (order.items && Array.isArray(order.items)) {
            order.items.forEach(item => {
              itemsHtml += `<div class="order-item"><span>${item.name}</span><span>LE ${item.price}</span></div>`;
            });
          }

          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="order-header">
              <span class="order-date">${d.toLocaleDateString()} ${d.toLocaleTimeString()}</span>
              <span class="order-status">New</span>
            </div>
            <div class="order-details">
              <p><strong>${order.customer_name}</strong></p>
              <p>📞 ${order.phone}</p>
              <p>📍 ${order.address}</p>
              <p>💳 ${order.payment_method === 'cod' ? 'Cash on Delivery' : 'Card'}</p>
            </div>
            <div class="order-items">
              ${itemsHtml}
              <div class="order-total">Total: LE ${order.total_price}</div>
            </div>
          `;
          container.appendChild(card);
        });

      } catch (err) {
        console.error('Error fetching orders:', err);
        container.innerHTML = '<div class="loader" style="color:var(--red);">Error loading orders.</div>';
      }
    }

    // Add Color Section for Products
    function addColorSection() {
      const container = document.getElementById('colorsContainer');
      const idx = colorCount++;
      const div = document.createElement('div');
      div.className = 'color-section';
      div.setAttribute('data-index', idx);
      div.innerHTML = `
        <div class="form-group">
          <label>Color Name</label>
          <input type="text" class="color-name" required placeholder="e.g. Red" />
        </div>
        <div class="form-group" style="margin-bottom: 0;">
          <label>Upload Images for this Color</label>
          <input type="file" class="color-images" multiple accept="image/*" onchange="previewImages(this, ${idx})" />
          <div class="image-preview-container" id="preview-${idx}"></div>
        </div>
      `;
      container.appendChild(div);
    }

    // Convert file to Base64
    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    // Preview Images
    function previewImages(input, idx) {
      const container = document.getElementById(`preview-${idx}`);
      container.innerHTML = '';
      if (input.files) {
        Array.from(input.files).forEach(file => {
          const img = document.createElement('img');
          img.className = 'image-preview';
          img.src = URL.createObjectURL(file);
          container.appendChild(img);
        });
      }
    }

    // Preview Hero Images
    function previewHeroImages(input) {
      const container = document.getElementById('heroPreview');
      container.innerHTML = '';
      if (input.files) {
        Array.from(input.files).forEach(file => {
          const img = document.createElement('img');
          img.className = 'image-preview';
          img.src = URL.createObjectURL(file);
          container.appendChild(img);
        });
      }
    }

    // Hero Form Submission
    document.getElementById('heroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitHeroBtn');
      const msg = document.getElementById('heroMessage');
      btn.textContent = 'Uploading...';
      btn.disabled = true;
      msg.textContent = '';
      
      try {
        const files = document.getElementById('heroImagesInput').files;
        if (!files || files.length === 0) throw new Error("Please select images.");
        
        const imagesBase64 = [];
        for (const file of Array.from(files)) {
          imagesBase64.push(await toBase64(file));
        }

        const { data, error } = await supabase
          .from('hero_images')
          .insert([{ images: imagesBase64 }]);

        if (error) {
          if (error.code === '42P01') {
            msg.style.color = 'var(--red, red)';
            msg.textContent = "Table 'hero_images' does not exist in Supabase yet.";
          } else {
            throw error;
          }
        } else {
          msg.style.color = 'var(--accent)';
          msg.textContent = 'Hero images uploaded successfully!';
          document.getElementById('heroForm').reset();
          document.getElementById('heroPreview').innerHTML = '';
        }
      } catch (err) {
        console.error(err);
        msg.style.color = 'var(--red, red)';
        
        // Supabase RLS error check
        if (err.message && err.message.includes("row-level security")) {
          msg.textContent = "Permission denied: Please disable Row Level Security (RLS) or add an insert policy for the 'hero_images' table in Supabase.";
        } else {
          msg.textContent = err.message || 'Failed to upload hero images.';
        }
      }
      btn.textContent = 'Upload Images';
      btn.disabled = false;
    });

    // Add Product Form Submission
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitProductBtn');
      const msg = document.getElementById('productMessage');
      btn.textContent = 'Saving...';
      btn.disabled = true;
      msg.textContent = '';

      try {
        const name = document.getElementById('prodName').value;
        const price = parseFloat(document.getElementById('prodPrice').value);
        const stock = parseInt(document.getElementById('prodStock').value);
        
        // Gather colors and images
        const colors = [];
        const colorSections = document.querySelectorAll('.color-section');
        
        for (const section of colorSections) {
          const colorName = section.querySelector('.color-name').value;
          const files = section.querySelector('.color-images').files;
          const imagesBase64 = [];
          
          if (files) {
            for (const file of Array.from(files)) {
              // Convert image to base64 to store in DB
              const b64 = await toBase64(file);
              imagesBase64.push(b64);
            }
          }
          colors.push({ color: colorName, images: imagesBase64 });
        }

        const { data, error } = await supabase
          .from('products')
          .insert([
            {
              name: name,
              price: price,
              stock: stock,
              colors: colors
            }
          ]);

        if (error) {
          if(error.code === '42P01') {
            msg.style.color = 'var(--red, red)';
            msg.textContent = "Table 'products' does not exist in Supabase yet. Please create it.";
          } else {
            throw error;
          }
        } else {
          msg.style.color = 'var(--accent)';
          msg.textContent = 'Product added successfully!';
          document.getElementById('addProductForm').reset();
          document.querySelectorAll('.image-preview-container').forEach(c => c.innerHTML = '');
        }

      } catch (err) {
        console.error('Error adding product:', err);
        msg.style.color = 'var(--red, red)';
        
        // Supabase RLS error check
        if (err.message && err.message.includes("row-level security")) {
          msg.textContent = "Permission denied: Please disable Row Level Security (RLS) or add an insert policy for the 'products' table in Supabase.";
        } else {
          msg.textContent = err.message || 'Failed to add product.';
        }
      }

      btn.textContent = 'Save Product';
      btn.disabled = false;
    });

    // Initial load
    document.addEventListener('DOMContentLoaded', () => {
      fetchOrders();
    });

  </script>
</body>
</html>
