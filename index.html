<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>لوحة تحكم تاربو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --primary: #111111;
      --text: #333333;
      --text-muted: #888888;
      --border: #e0e0e0;
      --border-strong: #cfd4da;
      --field-bg: #f8f9fb;
      --accent: #2d7a2d;
      --red: #d93025;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      direction: rtl;
    }
    header {
      background: var(--card-bg);
      padding: 18px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: 0.14em; direction: ltr; }
    .header-bar { display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; padding: 0 20px; }
    .icon-button { width: 40px; height: 40px; border: none; background: none; color: var(--text-muted); display: grid; place-items: center; border-radius: 10px; cursor: pointer; }
    .icon-button:active { background: #f4f6f8; }
    .icon-button svg { width: 21px; height: 21px; }
    main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 104px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .page-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .page-title h2 { font-size: 17px; line-height: 1.2; color: var(--primary); }
    .page-kicker { display: none; }
    .card { background: var(--card-bg); border: 1px solid #eef0f2; border-radius: 12px; padding: 14px; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(17,17,17,0.04); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .order-date { font-size: 12px; color: var(--text-muted); }
    .order-status { font-size: 10px; background: #e8f5e9; color: var(--accent); padding: 4px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; }
    .order-info { display: grid; gap: 7px; font-size: 14px; line-height: 1.45; }
    .order-info p { color: var(--text-muted); }
    .order-total { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0f1f2; font-weight: 800; text-align: left; color: var(--primary); }
    .empty-state {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 28px 20px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state h3 { margin-bottom: 8px; color: var(--primary); font-size: 16px; }
    .empty-state p { max-width: 280px; font-size: 13px; line-height: 1.5; }
    .form-grid { display: grid; gap: 13px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { margin-bottom: 0; }
    .form-group label { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.02em; }
    .form-group input,
    .form-group textarea {
      width: 100%;
      min-height: 44px;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      color: var(--primary);
      background: var(--field-bg);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-group textarea { resize: vertical; min-height: 82px; line-height: 1.45; }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(17,17,17,0.06);
    }
    input[type="color"] { height: 44px; padding: 5px; cursor: pointer; }
    input[type="file"] {
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 8px;
      cursor: pointer;
    }
    input[type="file"]::file-selector-button {
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: #fff;
      color: var(--primary);
      padding: 8px 10px;
      margin-left: 10px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .color-section,
    .size-section {
      display: grid;
      gap: 14px;
      padding: 12px;
      border: 1px solid #edf0f2;
      border-radius: 10px;
      background: #fbfcfd;
      margin-bottom: 12px;
    }
    .section-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-label span { font-size: 11px; font-weight: 800; color: var(--text-muted); }
    .swatch-line { display: grid; grid-template-columns: 84px 1fr; gap: 10px; align-items: end; }
    .size-line { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
    .actions { display: grid; gap: 10px; margin-top: 4px; }
    .btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px 14px; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; transition: transform 0.16s, opacity 0.16s, background 0.16s; }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-secondary { background: #6b6b6b; }
    .upload-panel { display: grid; gap: 14px; }
    .hero-preview { min-height: 104px; padding: 10px; border: 1px dashed var(--border-strong); border-radius: 10px; background: #fbfcfd; }
    .hero-preview:empty { align-items: center; justify-content: center; }
    .hero-preview:empty::before {
      content: "لم يتم اختيار صور";
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 82px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
    }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 22px 0; z-index: 10; max-width: 600px; margin: 0 auto; backdrop-filter: blur(12px); }
    .nav-item { min-width: 64px; min-height: 52px; border-radius: 10px; background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }
    .nav-item.active { color: var(--primary); }
    .nav-item:focus { outline: none; }
    .nav-item:focus-visible { background: #f4f6f8; }
    .nav-item svg { width: 24px; height: 24px; }
    #authOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .loader { text-align: center; padding: 20px; color: var(--text-muted); }
    .image-preview-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .image-preview { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); background: var(--field-bg); }
    .hero-preview .image-preview { width: 92px; height: 92px; }
    .hero-list { display: grid; gap: 10px; }
    .hero-list-title { margin-bottom: 12px; font-size: 14px; font-weight: 800; color: var(--primary); }
    .hero-item {
      display: grid;
      grid-template-columns: 36px 96px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fbfcfd;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.18s;
    }
    .hero-item.dragging { opacity: 0.68; border-color: var(--primary); box-shadow: 0 10px 24px rgba(17,17,17,0.12); transform: scale(0.99); }
    .hero-item.drag-over { border-color: var(--primary); }
    .hero-drag-handle {
      width: 36px;
      height: 44px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: grab;
      touch-action: none;
    }
    .hero-drag-handle:active { cursor: grabbing; }
    .hero-drag-handle svg { width: 18px; height: 18px; }
    .hero-item img { width: 96px; height: 72px; border-radius: 8px; object-fit: cover; background: var(--field-bg); }
    .hero-item-info { display: grid; gap: 8px; min-width: 0; }
    .hero-item-title { font-size: 13px; font-weight: 800; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hero-item-actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .mini-btn {
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--primary);
      border-radius: 7px;
      padding: 7px 9px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .mini-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .mini-btn-danger { border-color: #f1b8b4; color: var(--red); }
    .status-message { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
    .dashboard-product-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 14px; }
    .product-card { position: relative; cursor: default; }
    .product-img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; background: #f1f2f3; margin-bottom: 12px; }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
    .product-card:hover .product-img-wrap img { transform: scale(1.04); }
    .badge { position: absolute; top: 10px; left: 10px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; padding: 3px 7px; text-transform: uppercase; }
    .product-info { padding: 0 2px; }
    .product-name { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px; line-height: 1.4; color: var(--primary); direction: ltr; text-align: left; }
    .price-row { display: flex; align-items: center; gap: 8px; direction: ltr; justify-content: flex-start; }
    .price-sale { font-size: 13px; font-weight: 800; color: var(--primary); }
    .price-reg { font-size: 12px; color: var(--text-muted); text-decoration: line-through; }
    .product-meta { margin-top: 8px; color: var(--text-muted); font-size: 12px; line-height: 1.45; }
    .product-actions { margin-top: 10px; }
    .delete-product-btn,
    .inline-remove {
      border: 1px solid #f1b8b4;
      background: #fff;
      color: var(--red);
      border-radius: 7px;
      padding: 9px 10px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .delete-product-btn { width: 100%; }
    .delete-product-btn:disabled,
    .inline-remove:disabled { opacity: 0.45; cursor: not-allowed; }
    @media (max-width: 420px) {
      main { padding: 16px; padding-bottom: 100px; }
      header h1 { font-size: 16px; }
      .header-bar { padding: 0 12px; }
      .form-row,
      .swatch-line,
      .size-line { grid-template-columns: 1fr; }
      .card { padding: 14px; }
      .dashboard-product-grid { gap: 16px 12px; }
      .hero-item { grid-template-columns: 34px 82px 1fr; }
      .hero-item img { width: 82px; height: 66px; }
    }
  </style>
</head>
<body>
  <script>console.log("BODY SCRIPT START");</script>
  <div id="authOverlay">
    <div class="loader">جاري التحقق...</div>
  </div>

  <header>
    <div class="header-bar">
      <div style="width: 40px;"></div>
      <h1>TARBO</h1>
      <button class="icon-button" onclick="handleLogout()" aria-label="تسجيل الخروج" title="تسجيل الخروج">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <path d="M16 17l5-5-5-5"></path>
          <path d="M21 12H9"></path>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div id="ordersTab" class="tab-content active">
      <div class="page-title">
        <h2>الطلبات</h2>
      </div>
      <div id="ordersContainer"><div class="loader">جاري تحميل الطلبات...</div></div>
    </div>

    <div id="productsTab" class="tab-content">
      <div class="page-title">
        <h2>المنتجات</h2>
        <span class="page-kicker">المتجر</span>
      </div>
      <div id="productsContainer"><div class="loader">جاري تحميل المنتجات...</div></div>
    </div>

    <div id="addProductTab" class="tab-content">
      <div class="page-title">
        <h2>إضافة منتج</h2>
        <span class="page-kicker">المتجر</span>
      </div>
      <div class="card">
        <form id="addProductForm" class="form-grid">
          <div class="form-group"><label>اسم المنتج</label><input type="text" id="prodName" required /></div>
          <div class="form-group"><label>الوصف</label><textarea id="prodDesc" rows="3"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>السعر</label><input type="number" id="prodPrice" required /></div>
            <div class="form-group"><label>المخزون</label><input type="number" id="prodStock" required /></div>
          </div>
          <div id="sizesContainer">
            <div class="size-section">
              <div class="section-label"><span>مقاس 1</span></div>
              <div class="size-line">
                <div class="form-group"><label>المقاس</label><input type="text" class="size-value" required placeholder="مثال: S" /></div>
              </div>
            </div>
          </div>
          <div id="colorsContainer">
            <div class="color-section">
              <div class="section-label"><span>لون المنتج</span></div>
              <div class="swatch-line">
                <div class="form-group"><label>اللون</label><input type="color" class="color-code" value="#000000" /></div>
                <div class="form-group"><label>الصور</label><input type="file" class="color-images" multiple accept="image/*" onchange="previewImages(this, 0)" /><div class="image-preview-container" id="preview-0"></div></div>
              </div>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-secondary" onclick="addSizeSection()">+ مقاس آخر</button>
            <button type="button" class="btn btn-secondary" onclick="addColorSection()">+ لون آخر</button>
            <button type="submit" class="btn" id="submitProductBtn">حفظ المنتج</button>
          </div>
        </form>
      </div>
    </div>

    <div id="heroTab" class="tab-content">
      <div class="page-title">
        <h2>صور الواجهة</h2>
        <span class="page-kicker">الرئيسية</span>
      </div>
      <div class="card">
        <form id="heroForm" class="upload-panel">
          <div class="form-group"><label>صور الواجهة</label><input type="file" id="heroImagesInput" multiple accept="image/*" onchange="previewHeroImages(this)" /></div>
          <div class="image-preview-container hero-preview" id="selectedHeroPreview"></div>
          <button type="submit" class="btn" id="submitHeroBtn">رفع الصور</button>
        </form>
      </div>
      <div class="card">
        <div class="hero-list-title">الصور الحالية</div>
        <div class="hero-list" id="heroImagesList">
          <div class="loader">جاري تحميل صور الواجهة...</div>
        </div>
      </div>
    </div>

    <div id="governoratesTab" class="tab-content">
      <div class="page-title">
        <h2>المحافظات والشحن</h2>
      </div>
      <!-- Settings card for wallet phone -->
      <div class="card" style="margin-bottom:14px;">
        <div class="section-label"><span>رقم المحفظة الإلكترونية</span></div>
        <div class="form-grid">
          <div class="form-group">
            <label>رقم التحويل (Vodafone Cash / InstaPay)</label>
            <input type="tel" id="walletPhoneInput" placeholder="01xxxxxxxxx" />
          </div>
          <div class="actions">
            <button class="btn" onclick="saveWalletPhone()">حفظ الرقم</button>
          </div>
        </div>
      </div>
      <!-- Governorates list -->
      <div class="card">
        <div class="section-label"><span>قائمة المحافظات</span></div>
        <div id="governoratesContainer"><div class="loader">جاري التحميل...</div></div>
      </div>
    </div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('ordersTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
      الطلبات
    </button>
    <button class="nav-item" onclick="switchTab('productsTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
      المنتجات
    </button>
    <button class="nav-item" onclick="switchTab('addProductTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
      منتج
    </button>
    <button class="nav-item" onclick="switchTab('heroTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      الواجهة
    </button>
    <button class="nav-item" onclick="switchTab('governoratesTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      الشحن
    </button>
  </nav>

  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <script>
    /**
     * DASHBOARD CHANGES SUMMARY:
     * - Hero images are managed as one database row per image.
     * - Uploads go to Supabase Storage bucket "hero" then save image_url/storage_path.
     * - Dashboard supports product listing/deletion, multi-size input, drag ordering, and delete with explicit error handling.
     */
    window.onload = () => {
      console.log("WINDOW ONLOAD - DASHBOARD START");
    const supabaseUrl = 'https://erbidxbhooavcynttbml.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyYmlkeGJob29hdmN5bnR0Ym1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODk5MTgsImV4cCI6MjA5Mjc2NTkxOH0.HyksCx9ZVhZNdXfgNLiH3V9HnZUDh8I3KFbM_ovUn8o';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    const sessionKey = 'tarboAdminSession';

    function checkAuth() {
      console.log("Checking Auth...");
      if (!localStorage.getItem(sessionKey)) {
        window.location.href = 'login.html';
      } else {
        document.getElementById('authOverlay').style.display = 'none';
        fetchOrders();
      }
    }

    // Global functions for HTML onclick attributes
    window.switchTab = (id, btn) => {
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      const target = document.getElementById(id);
      if (target) target.style.display = 'block';
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      if (id === 'ordersTab') fetchOrders();
      if (id === 'productsTab') fetchProducts();
      if (id === 'heroTab') fetchHeroImages();
      if (id === 'governoratesTab') { fetchGovernorates(); loadWalletPhoneSetting(); }
    };

    window.handleLogout = () => {
      localStorage.removeItem(sessionKey);
      window.location.href = 'login.html';
    };

    window.addColorSection = () => {
      const container = document.getElementById('colorsContainer');
      const idx = document.querySelectorAll('.color-section').length;
      const div = document.createElement('div');
      div.className = 'color-section';
      div.innerHTML = `<div class="section-label"><span>لون ${idx + 1}</span></div><div class="swatch-line"><div class="form-group"><label>اللون</label><input type="color" class="color-code" value="#ffffff" /></div><div class="form-group"><label>الصور</label><input type="file" class="color-images" multiple accept="image/*" onchange="previewImages(this, ${idx})" /><div class="image-preview-container" id="preview-${idx}"></div></div></div>`;
      container.appendChild(div);
    };

    window.addSizeSection = () => {
      const container = document.getElementById('sizesContainer');
      const idx = document.querySelectorAll('.size-section').length;
      const div = document.createElement('div');
      div.className = 'size-section';
      div.innerHTML = `<div class="section-label"><span>مقاس ${idx + 1}</span></div><div class="size-line"><div class="form-group"><label>المقاس</label><input type="text" class="size-value" required placeholder="مثال: XL" /></div><button type="button" class="inline-remove" onclick="removeSizeSection(this)">حذف</button></div>`;
      container.appendChild(div);
      div.querySelector('.size-value').focus();
    };

    window.removeSizeSection = (button) => {
      const sections = document.querySelectorAll('.size-section');
      if (sections.length <= 1) return;
      button.closest('.size-section').remove();
      document.querySelectorAll('.size-section .section-label span').forEach((label, index) => {

    async function uploadFile(file, bucket) {
      const safeName = file.name.toLowerCase().replace(/[^a-z0-9.]+/g, '-').replace(/^-+|-+$/g, '') || 'image';
      const uniqueId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
      const path = `${Date.now()}-${uniqueId}-${safeName}`;
      const { error: uploadError } = await supabaseClient.storage.from(bucket).upload(path, file, {
        contentType: file.type || 'image/jpeg',
        upsert: false
      });
      if (uploadError) throw new Error(`فشل رفع الصورة: ${uploadError.message}`);

      const { data } = supabaseClient.storage.from(bucket).getPublicUrl(path);
      if (!data || !data.publicUrl) throw new Error('تم رفع الملف لكن تعذر إنشاء رابط عام للصورة');

      return { path, publicUrl: data.publicUrl };
    }

    async function uploadImage(file, bucket) {
      const uploaded = await uploadFile(file, bucket);
      return uploaded.publicUrl;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function collectSizes() {
      return Array.from(document.querySelectorAll('.size-value'))
        .map(input => input.value.trim())
        .filter(Boolean);
    }

    function getProductImageUrls(product) {
      const urls = [];
      if (product.image_url) urls.push(product.image_url);
      if (Array.isArray(product.colors)) {
        product.colors.forEach(color => {
          if (!Array.isArray(color.images)) return;
          color.images.forEach(url => {
            if (url && !urls.includes(url)) urls.push(url);
          });
        });
      }
      return urls;
    }

    function getProductStoragePaths(product) {
      return getProductImageUrls(product)
        .map(url => extractStoragePath(url, productsBucket))
        .filter(Boolean)
        .filter((path, index, paths) => paths.indexOf(path) === index);
    }

    function extractStoragePath(url, bucket) {
      if (!url) return '';
      const markers = [`/storage/v1/object/public/${bucket}/`, `/object/public/${bucket}/`];
      const marker = markers.find(value => url.includes(value));
      if (!marker) return '';
      const rawPath = url.split(marker)[1].split('?')[0];
      try {
        return decodeURIComponent(rawPath);
      } catch (err) {
        return rawPath;
      }
    }

        await fetchProducts();

    function renderHeroImages(activeDragIndex = null) {
      const cont = document.getElementById('heroImagesList');
      if (!cont) return;
      cont.innerHTML = '';

      if (!heroImages.length) {
        cont.innerHTML = '<div class="status-message">لا توجد صور هيرو مرفوعة حالياً. ارفع صورة من النموذج بالأعلى لتظهر في المتجر.</div>';
        return;
      }

      heroImages.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'hero-item';
        if (index === activeDragIndex) row.classList.add('dragging');
        row.draggable = true;
        row.dataset.index = index;

        row.addEventListener('dragstart', (event) => {
          heroDragIndex = index;
          row.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', String(index));
        });

        row.addEventListener('dragend', () => {
          heroDragIndex = null;
          row.classList.remove('dragging');
          document.querySelectorAll('.hero-item.drag-over').forEach(itemNode => itemNode.classList.remove('drag-over'));
        });

        row.addEventListener('dragover', (event) => {
          event.preventDefault();
          event.dataTransfer.dropEffect = 'move';
          row.classList.add('drag-over');
        });

        row.addEventListener('dragleave', () => {
          row.classList.remove('drag-over');
        });

        row.addEventListener('drop', (event) => {
          event.preventDefault();
          row.classList.remove('drag-over');
          const transferIndex = event.dataTransfer.getData('text/plain');
          const fromIndex = transferIndex !== '' ? Number(transferIndex) : heroDragIndex;
          moveHeroImageTo(fromIndex, index);
        });

        const dragHandle = document.createElement('button');
        dragHandle.type = 'button';
        dragHandle.className = 'hero-drag-handle';
        dragHandle.setAttribute('aria-label', 'ترتيب الصورة بالسحب');
        dragHandle.title = 'اسحب لترتيب الصورة';
        dragHandle.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 6h.01M9 12h.01M9 18h.01M15 6h.01M15 12h.01M15 18h.01"></path></svg>';
        dragHandle.addEventListener('pointerdown', (event) => startHeroPointerDrag(event, index));

        const img = document.createElement('img');
        img.src = item.image_url;
        img.alt = item.title || `Hero image ${index + 1}`;

        const info = document.createElement('div');
        info.className = 'hero-item-info';

        const title = document.createElement('div');
        title.className = 'hero-item-title';
        title.textContent = item.title || `صورة الواجهة ${index + 1}`;

        const actions = document.createElement('div');
        actions.className = 'hero-item-actions';

        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'mini-btn mini-btn-danger';
        deleteBtn.textContent = 'حذف';
        deleteBtn.dataset.heroAction = 'delete';
        deleteBtn.addEventListener('click', () => deleteHeroImage(item));

        actions.append(deleteBtn);
        info.append(title, actions);
        row.append(dragHandle, img, info);
        cont.appendChild(row);
      });
    }

    async function fetchHeroImages() {
      const { data, error } = await supabaseClient
        .from('hero_images')
        .select('id,image_url,title,storage_path,sort_order,created_at')
        .order('sort_order', { ascending: true })
        .order('id', { ascending: true });

      if (error) {
        heroSchemaReady = false;
        document.getElementById('heroImagesList').innerHTML = `<div class="status-message">${getHeroSetupMessage(error.message)}</div>`;
        return;
      }

      heroSchemaReady = true;
      heroImages = (data || []).filter(item => item.image_url);
      renderHeroImages();
    }

    async function saveHeroOrder() {
      const updates = heroImages.map((item, index) =>
        supabaseClient.from('hero_images').update({ sort_order: index + 1 }).eq('id', item.id)
      );
      const results = await Promise.all(updates);
      const failed = results.find(result => result.error);
      if (failed) throw new Error(`تعذر حفظ ترتيب الصور: ${failed.error.message}`);
    }

    function reorderHeroImages(fromIndex, toIndex) {
      if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex)) return false;
      if (fromIndex < 0 || toIndex < 0 || fromIndex >= heroImages.length || toIndex >= heroImages.length) return false;
      if (fromIndex === toIndex) return false;
      const [moved] = heroImages.splice(fromIndex, 1);
      heroImages.splice(toIndex, 0, moved);
      return true;
    }

    async function moveHeroImageTo(fromIndex, toIndex) {
      if (!Number.isInteger(fromIndex) || !Number.isInteger(toIndex) || fromIndex === toIndex) return;

      setHeroBusy(true);
      const originalOrder = [...heroImages];
      try {
        if (reorderHeroImages(fromIndex, toIndex)) {
          renderHeroImages();
          setHeroBusy(true);
          await saveHeroOrder();
          await fetchHeroImages();
        }
      } catch (err) {
        heroImages = originalOrder;
        renderHeroImages();
        alert(err.message);
      } finally {
        setHeroBusy(false);
      }
    }

    function startHeroPointerDrag(event, index) {
      if (event.button !== undefined && event.button !== 0) return;
      event.preventDefault();
      heroPointerDrag = {
        currentIndex: index,
        originalOrder: [...heroImages],
        changed: false
      };
      document.body.style.userSelect = 'none';
      window.addEventListener('pointermove', handleHeroPointerMove);
      window.addEventListener('pointerup', finishHeroPointerDrag, { once: true });
      window.addEventListener('pointercancel', finishHeroPointerDrag, { once: true });
      renderHeroImages(index);
    }

    function handleHeroPointerMove(event) {
      if (!heroPointerDrag) return;
      const target = document.elementFromPoint(event.clientX, event.clientY);
      const row = target && target.closest ? target.closest('.hero-item') : null;
      if (!row) return;
      const targetIndex = Number(row.dataset.index);
      if (!Number.isInteger(targetIndex) || targetIndex === heroPointerDrag.currentIndex) return;
      if (!reorderHeroImages(heroPointerDrag.currentIndex, targetIndex)) return;
      heroPointerDrag.currentIndex = targetIndex;
      heroPointerDrag.changed = true;
      renderHeroImages(targetIndex);
    }

    async function finishHeroPointerDrag() {
      window.removeEventListener('pointermove', handleHeroPointerMove);
      window.removeEventListener('pointerup', finishHeroPointerDrag);
      window.removeEventListener('pointercancel', finishHeroPointerDrag);
      document.body.style.userSelect = '';

      const drag = heroPointerDrag;
      heroPointerDrag = null;
      if (!drag) return;

      if (!drag.changed) {
        renderHeroImages();
        return;
      }

      setHeroBusy(true);
      try {
        await saveHeroOrder();
        await fetchHeroImages();
      } catch (err) {
        heroImages = drag.originalOrder;
        renderHeroImages();
        alert(err.message);
      }
      setHeroBusy(false);
    }

    async function deleteHeroImage(item) {
      if (!confirm('هل تريد حذف هذه الصورة من الهيرو؟')) return;

      setHeroBusy(true);
      try {
        const { error } = await supabaseClient.from('hero_images').delete().eq('id', item.id);
        if (error) throw new Error(`تعذر حذف الصورة: ${error.message}`);

        if (item.storage_path) {
          const { error: storageError } = await supabaseClient.storage.from(heroBucket).remove([item.storage_path]);
          if (storageError) console.warn('Could not delete hero file:', storageError.message);
        }

        await fetchHeroImages();
      } catch (err) {
        alert(err.message);
      }
      setHeroBusy(false);
    }

    async function fetchGovernorates() {
      const cont = document.getElementById('governoratesContainer');
      if (!cont) return;
      cont.innerHTML = '<div class="loader">جاري التحميل...</div>';

      // Try to get from DB first
      const { data: dbData, error } = await supabaseClient.from('governorates').select('*').order('name_ar');

      let govList = [];
      if (!error && dbData && dbData.length) {
        govList = dbData;
      } else {
        // Seed from EG_GOVERNORATES list
        await seedGovernorates();
        const { data: seeded } = await supabaseClient.from('governorates').select('*').order('name_ar');
        govList = seeded || [];
      }

      renderGovernoratesTable(govList);
    }

    async function seedGovernorates() {
      const rows = EG_GOVERNORATES.map(g => ({ name_ar: g.name_ar, name_en: g.name_en, shipping_price: 50 }));
      await supabaseClient.from('governorates').upsert(rows, { onConflict: 'name_en' });
    }

    function renderGovernoratesTable(govList) {
      const cont = document.getElementById('governoratesContainer');
      if (!govList.length) { cont.innerHTML = '<div class="status-message">لا توجد محافظات</div>'; return; }

      const table = document.createElement('div');
      table.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr 100px 80px;gap:8px;font-size:11px;font-weight:800;color:#888;text-transform:uppercase;padding:0 4px 8px;border-bottom:1px solid #eee;">
          <span>المحافظة</span><span>Governorate</span><span>سعر الشحن (LE)</span><span></span>
        </div>`;

      govList.forEach(g => {
        const row = document.createElement('div');
        row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 100px 90px;gap:8px;align-items:center;padding:10px 4px;border-bottom:1px solid #f5f5f5;';
        row.innerHTML = `
          <span style="font-size:14px;">${escapeHtml(g.name_ar || '')}</span>
          <span style="font-size:13px;color:#888;">${escapeHtml(g.name_en || '')}</span>
          <input type="number" min="0" step="1" value="${Number(g.shipping_price || 0)}" id="gov-price-${g.id}" style="padding:6px 8px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;width:90px;" />
          <button class="mini-btn" id="gov-btn-${g.id}" onclick="saveGovPrice('${g.id}')" style="padding:6px 10px;min-width:72px;transition:background .2s,color .2s;">حفظ</button>`;
        table.appendChild(row);
      });
      cont.innerHTML = '';
      cont.appendChild(table);
    }

    window.saveGovPrice = async (govId) => {
      const input = document.getElementById(`gov-price-${govId}`);
      const btn   = document.getElementById(`gov-btn-${govId}`);
      if (!input || !btn) return;
      const price = parseFloat(input.value) || 0;
      btn.disabled = true;
      btn.textContent = '...';
      const { error } = await supabaseClient.from('governorates').update({ shipping_price: price }).eq('id', govId);
      if (error) {
        btn.textContent = '✗ فشل';
        btn.style.background = '#d92b2b';
        btn.style.color = '#fff';
        setTimeout(() => { btn.textContent = 'حفظ'; btn.style.background = ''; btn.style.color = ''; btn.disabled = false; }, 2500);
        return;
      }
      btn.textContent = '✓ تم';
      btn.style.background = '#2d7a2d';
      btn.style.color = '#fff';
      input.style.borderColor = '#2d7a2d';
      setTimeout(() => {
        btn.textContent = 'حفظ';
        btn.style.background = '';
        btn.style.color = '';
        btn.disabled = false;
        input.style.borderColor = '';
      }, 2000);
    };

    // ── Wallet phone setting ──────────────────────────────────
    async function loadWalletPhoneSetting() {
      const { data, error } = await supabaseClient.from('settings').select('value').eq('key','wallet_phone').single();
      if (!error && data) document.getElementById('walletPhoneInput').value = data.value || '';
    }

    window.saveWalletPhone = async () => {
      const val = (document.getElementById('walletPhoneInput').value || '').trim();
      const { error } = await supabaseClient.from('settings').upsert({ key: 'wallet_phone', value: val }, { onConflict: 'key' });
      if (error) { alert('فشل الحفظ: ' + error.message); return; }
      alert('تم حفظ الرقم بنجاح');
    };

    checkAuth();
    checkProductDetailsSchema();
    fetchProducts();
    fetchHeroImages();
    };
