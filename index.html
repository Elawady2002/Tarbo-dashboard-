<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>لوحة تحكم تاربو</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f6f8;
      --card-bg: #ffffff;
      --primary: #111111;
      --text: #333333;
      --text-muted: #888888;
      --border: #e0e0e0;
      --border-strong: #cfd4da;
      --field-bg: #f8f9fb;
      --accent: #2d7a2d;
      --red: #d93025;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      direction: rtl;
    }
    header {
      background: var(--card-bg);
      padding: 18px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: 0.14em; direction: ltr; }
    .header-bar { display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; padding: 0 20px; }
    .icon-button { width: 40px; height: 40px; border: none; background: none; color: var(--text-muted); display: grid; place-items: center; border-radius: 10px; cursor: pointer; }
    .icon-button:active { background: #f4f6f8; }
    .icon-button svg { width: 21px; height: 21px; }
    main { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 104px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .page-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
    .page-title h2 { font-size: 17px; line-height: 1.2; color: var(--primary); }
    .page-kicker { display: none; }
    .card { background: var(--card-bg); border: 1px solid #eef0f2; border-radius: 12px; padding: 14px; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(17,17,17,0.04); }
    .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
    .order-date { font-size: 12px; color: var(--text-muted); }
    .order-status { font-size: 10px; background: #e8f5e9; color: var(--accent); padding: 4px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; }
    .order-info { display: grid; gap: 7px; font-size: 14px; line-height: 1.45; }
    .order-info p { color: var(--text-muted); }
    .order-total { margin-top: 14px; padding-top: 12px; border-top: 1px solid #f0f1f2; font-weight: 800; text-align: left; color: var(--primary); }
    .empty-state {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 28px 20px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state h3 { margin-bottom: 8px; color: var(--primary); font-size: 16px; }
    .empty-state p { max-width: 280px; font-size: 13px; line-height: 1.5; }
    .form-grid { display: grid; gap: 13px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { margin-bottom: 0; }
    .form-group label { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.02em; }
    .form-group input,
    .form-group textarea {
      width: 100%;
      min-height: 44px;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      color: var(--primary);
      background: var(--field-bg);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-group textarea { resize: vertical; min-height: 82px; line-height: 1.45; }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(17,17,17,0.06);
    }
    input[type="color"] { height: 44px; padding: 5px; cursor: pointer; }
    input[type="file"] {
      display: flex;
      align-items: center;
      min-height: 48px;
      padding: 8px;
      cursor: pointer;
    }
    input[type="file"]::file-selector-button {
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: #fff;
      color: var(--primary);
      padding: 8px 10px;
      margin-left: 10px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .color-section {
      display: grid;
      gap: 14px;
      padding: 12px;
      border: 1px solid #edf0f2;
      border-radius: 10px;
      background: #fbfcfd;
      margin-bottom: 12px;
    }
    .section-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-label span { font-size: 11px; font-weight: 800; color: var(--text-muted); }
    .swatch-line { display: grid; grid-template-columns: 84px 1fr; gap: 10px; align-items: end; }
    .actions { display: grid; gap: 10px; margin-top: 4px; }
    .btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 15px 14px; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; transition: transform 0.16s, opacity 0.16s, background 0.16s; }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-secondary { background: #6b6b6b; }
    .upload-panel { display: grid; gap: 14px; }
    .hero-preview { min-height: 104px; padding: 10px; border: 1px dashed var(--border-strong); border-radius: 10px; background: #fbfcfd; }
    .hero-preview:empty { align-items: center; justify-content: center; }
    .hero-preview:empty::before {
      content: "لم يتم اختيار صور";
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 82px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
    }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.96); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 22px 0; z-index: 10; max-width: 600px; margin: 0 auto; backdrop-filter: blur(12px); }
    .nav-item { min-width: 76px; min-height: 52px; border-radius: 10px; background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 11px; font-weight: 700; cursor: pointer; }
    .nav-item.active { color: var(--primary); }
    .nav-item:focus { outline: none; }
    .nav-item:focus-visible { background: #f4f6f8; }
    .nav-item svg { width: 24px; height: 24px; }
    #authOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .loader { text-align: center; padding: 20px; color: var(--text-muted); }
    .image-preview-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .image-preview { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); background: var(--field-bg); }
    .hero-preview .image-preview { width: 92px; height: 92px; }
    @media (max-width: 420px) {
      main { padding: 16px; padding-bottom: 100px; }
      header h1 { font-size: 16px; }
      .header-bar { padding: 0 12px; }
      .form-row,
      .swatch-line { grid-template-columns: 1fr; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <script>console.log("BODY SCRIPT START");</script>
  <div id="authOverlay">
    <div class="loader">جاري التحقق...</div>
  </div>

  <header>
    <div class="header-bar">
      <div style="width: 40px;"></div>
      <h1>TARBO</h1>
      <button class="icon-button" onclick="handleLogout()" aria-label="تسجيل الخروج" title="تسجيل الخروج">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <path d="M16 17l5-5-5-5"></path>
          <path d="M21 12H9"></path>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div id="ordersTab" class="tab-content active">
      <div class="page-title">
        <h2>الطلبات</h2>
      </div>
      <div id="ordersContainer"><div class="loader">جاري تحميل الطلبات...</div></div>
    </div>

    <div id="addProductTab" class="tab-content">
      <div class="page-title">
        <h2>إضافة منتج</h2>
        <span class="page-kicker">المتجر</span>
      </div>
      <div class="card">
        <form id="addProductForm" class="form-grid">
          <div class="form-group"><label>اسم المنتج</label><input type="text" id="prodName" required /></div>
          <div class="form-group"><label>الوصف</label><textarea id="prodDesc" rows="3"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>السعر</label><input type="number" id="prodPrice" required /></div>
            <div class="form-group"><label>المخزون</label><input type="number" id="prodStock" required /></div>
          </div>
          <div class="form-group"><label>المقاسات</label><input type="text" id="prodSizes" required placeholder="مثال: S, M, L, XL" /></div>
          <div id="colorsContainer">
            <div class="color-section">
              <div class="section-label"><span>لون المنتج</span></div>
              <div class="swatch-line">
                <div class="form-group"><label>اللون</label><input type="color" class="color-code" value="#000000" /></div>
                <div class="form-group"><label>الصور</label><input type="file" class="color-images" multiple onchange="previewImages(this, 0)" /><div class="image-preview-container" id="preview-0"></div></div>
              </div>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-secondary" onclick="addColorSection()">+ لون آخر</button>
            <button type="submit" class="btn" id="submitProductBtn">حفظ المنتج</button>
          </div>
        </form>
      </div>
    </div>

    <div id="heroTab" class="tab-content">
      <div class="page-title">
        <h2>صور الواجهة</h2>
        <span class="page-kicker">الرئيسية</span>
      </div>
      <div class="card">
        <form id="heroForm" class="upload-panel">
          <div class="form-group"><label>صور الواجهة</label><input type="file" id="heroImagesInput" multiple onchange="previewHeroImages(this)" /></div>
          <div class="image-preview-container hero-preview" id="heroPreview"></div>
          <button type="submit" class="btn" id="submitHeroBtn">رفع الصور</button>
        </form>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('ordersTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
      الطلبات
    </button>
    <button class="nav-item" onclick="switchTab('addProductTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
      منتج
    </button>
    <button class="nav-item" onclick="switchTab('heroTab', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
      الواجهة
    </button>
  </nav>

  <script src="https://unpkg.com/@supabase/supabase-js@2" defer></script>
  <script>
    window.onload = () => {
      console.log("WINDOW ONLOAD - DASHBOARD START");
    const supabaseUrl = 'https://erbidxbhooavcynttbml.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyYmlkeGJob29hdmN5bnR0Ym1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODk5MTgsImV4cCI6MjA5Mjc2NTkxOH0.HyksCx9ZVhZNdXfgNLiH3V9HnZUDh8I3KFbM_ovUn8o';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    const sessionKey = 'tarboAdminSession';

    function checkAuth() {
      console.log("Checking Auth...");
      if (!localStorage.getItem(sessionKey)) {
        window.location.href = 'login.html';
      } else {
        document.getElementById('authOverlay').style.display = 'none';
        fetchOrders();
      }
    }

    // Global functions for HTML onclick attributes
    window.switchTab = (id, btn) => {
      document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
      const target = document.getElementById(id);
      if (target) target.style.display = 'block';
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      if (id === 'ordersTab') fetchOrders();
    };

    window.handleLogout = () => {
      localStorage.removeItem(sessionKey);
      window.location.href = 'login.html';
    };

    window.addColorSection = () => {
      const container = document.getElementById('colorsContainer');
      const idx = document.querySelectorAll('.color-section').length;
      const div = document.createElement('div');
      div.className = 'color-section';
      div.innerHTML = `<div class="section-label"><span>لون ${idx + 1}</span></div><div class="swatch-line"><div class="form-group"><label>اللون</label><input type="color" class="color-code" value="#ffffff" /></div><div class="form-group"><label>الصور</label><input type="file" class="color-images" multiple onchange="previewImages(this, ${idx})" /><div class="image-preview-container" id="preview-${idx}"></div></div></div>`;
      container.appendChild(div);
    };

    window.previewImages = (input, idx) => {
      const cont = document.getElementById(`preview-${idx}`);
      if (!cont) return;
      cont.innerHTML = '';
      Array.from(input.files).forEach(f => {
        const img = document.createElement('img');
        img.className = 'image-preview';
        img.src = URL.createObjectURL(f);
        cont.appendChild(img);
      });
    };

    window.previewHeroImages = (input) => {
      const cont = document.getElementById('heroPreview');
      if (!cont) return;
      cont.innerHTML = '';
      Array.from(input.files).forEach(f => {
        const img = document.createElement('img');
        img.className = 'image-preview';
        img.src = URL.createObjectURL(f);
        cont.appendChild(img);
      });
    };

    async function fetchOrders() {
      const cont = document.getElementById('ordersContainer');
      cont.innerHTML = '<div class="card"><div class="loader">جاري تحميل الطلبات...</div></div>';
      const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
      if (error) {
        cont.innerHTML = `<div class="card empty-state"><div><h3>تعذر تحميل الطلبات</h3><p>${error.message}</p></div></div>`;
        return;
      }
      if (!data.length) {
        cont.innerHTML = '<div class="card empty-state"><div><h3>لا توجد طلبات</h3><p>أي طلب جديد من المتجر سيظهر هنا مباشرة.</p></div></div>';
        return;
      }
      cont.innerHTML = '';
      data.forEach(o => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="order-header"><span class="order-date">${new Date(o.created_at).toLocaleString('ar-EG')}</span><span class="order-status">جديد</span></div><div class="order-info"><strong>${o.customer_name}</strong><p>${o.phone || 'بدون رقم'} | ${o.address || 'بدون عنوان'}</p></div><div class="order-total">${o.total_price} جنيه</div>`;
        cont.appendChild(div);
      });
    }

    // Helper to upload images
    async function uploadImage(file, bucket) {
      const name = `${Math.random().toString(36).substring(7)}-${Date.now()}`;
      await supabaseClient.storage.from(bucket).upload(name, file);
      return supabaseClient.storage.from(bucket).getPublicUrl(name).data.publicUrl;
    }

    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitProductBtn');
      btn.disabled = true;
      try {
        const colors = [];
        for (const s of document.querySelectorAll('.color-section')) {
          const code = s.querySelector('.color-code').value;
          const files = s.querySelector('.color-images').files;
          const urls = [];
          for (const f of files) urls.push(await uploadImage(f, 'products'));
          colors.push({ color: code, images: urls });
        }
        await supabaseClient.from('products').insert([{
          name: document.getElementById('prodName').value,
          description: document.getElementById('prodDesc').value,
          price: parseFloat(document.getElementById('prodPrice').value),
          stock: parseInt(document.getElementById('prodStock').value),
          sizes: document.getElementById('prodSizes').value.split(',').map(s => s.trim()),
          colors
        }]);
        alert('تم الحفظ');
        location.reload();
      } catch (err) { alert(err.message); }
      btn.disabled = false;
    });

    document.getElementById('heroForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitHeroBtn');
      btn.disabled = true;
      try {
        const urls = [];
        for (const f of document.getElementById('heroImagesInput').files) urls.push(await uploadImage(f, 'hero'));
        await supabaseClient.from('hero_images').insert([{ images: urls }]);
        alert('تم الرفع');
        location.reload();
      } catch (err) { alert(err.message); }
      btn.disabled = false;
    });

    checkAuth();
    };
  </script>
</body>
</html>
